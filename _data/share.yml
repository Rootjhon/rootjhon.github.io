#  Sharing options at the bottom of the post.
#  Icons from <https://fontawesome.com/>
# https://www.jianshu.com/p/f51628c46827

platforms:
  -
    type: QQ
    icon: "fa-brands fa-qq"
    link: "http://connect.qq.com/widget/shareqq/index.html?url=URL&showcount=0&desc=1&summary=2&title=TITLE&site=junqiang&pics="

  -
    type: Wechat
    icon: "fa-brands fa-weixin"
    link: "http://www.jiathis.com/send/?webid=weixin&url=URL&title=TITLE&summary=1&pic="

  -
    type: Linkedin
    icon: "fab fa-linkedin"
    link: "https://www.linkedin.com/sharing/share-offsite/?url=URL"

  -
    type: Twitter
    icon: "fab fa-twitter"
    link: "https://twitter.com/intent/tweet?text=TITLE&url=URL"
